<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>멀티 서비스 (로또 & 동물상)</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="header-controls">
      <div class="nav-tabs">
        <button class="nav-btn active" onclick="switchMode('lotto')">🎰 로또 추천</button>
        <button class="nav-btn" onclick="switchMode('animal')">🐶 동물상 테스트</button>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>

    <!-- 로또 섹션 -->
    <div id="lotto-section" class="mode-section">
      <h1>🎰 로또 번호 추천기</h1>
      <p>버튼을 누르면 로또 번호 5세트를 추천해줘.</p>
      <button onclick="generateLottoSets()">번호 추천받기</button>
      <div id="numbers"></div>
    </div>

    <!-- 동물상 섹션 -->
    <div id="animal-section" class="mode-section" style="display: none;">
      <h1>🐶 동물상 테스트</h1>
      <p>사진을 업로드하여 당신이 어떤 동물상인지 알아보세요!</p>
      
      <div class="upload-container">
        <input type="file" id="image-upload" accept="image/*" onchange="handleFileUpload(event)" style="display: none;">
        <label for="image-upload" class="upload-btn">📸 사진 선택하기</label>
      </div>

      <div id="image-preview-container" style="display: none;">
        <img id="face-image" src="#" alt="Preview" style="max-width: 100%; border-radius: 14px; margin: 20px 0;">
      </div>

      <div id="result-message" class="result-message"></div>
      <div id="animal-result-image-container" style="display: none; margin-bottom: 20px;">
        <img id="animal-result-image" src="" alt="Animal Result" style="max-width: 200px; border-radius: 50%; border: 5px solid var(--button-bg); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);">
      </div>
      <div id="label-container"></div>
    </div>

    <hr class="divider">

    <div class="form-container">
      <h2>🤝 제휴 문의</h2>
      <p>제휴 관련 문의사항을 남겨주시면 검토 후 연락드리겠습니다.</p>
      <form action="https://formspree.io/f/xojpladl" method="POST">
        <div class="form-group">
          <label for="name">성함 / 업체명</label>
          <input type="text" id="name" name="name" placeholder="예: 홍길동 / (주)파트너스" required>
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
        </div>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
    </div>

    <hr class="divider">

    <div id="disqus_thread"></div>
    <script>
        (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://testing-ohwpkk5uxn.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
  </div>

  <script src="main.js"></script>
</body>
</html>
